<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!--Meta Data-->
        <title>Table of Contents</title>
        <meta name="description" content="Table of Contents is the Book family's digital recipe collection — where every recipe describes a mouthwatering story. Explore generations of family favorites, discover new dishes, and connect through the joy of home cooking.">
        <link rel="icon" href="images/favicon.ico" type="image/x-icon">
        <link href="css/style.css" rel="stylesheet">
    </head>
    <body>
        <!--Header-->
        <div class="header">
            <div class="header-top">
                <a href="index.html" id="header-logo">Table of Contents</a>
                <div class="header-links">
                    <a href="index.html">Recipes</a>
                </div>
            </div>
            <div class="filters">
                <input type="text" id="search-bar" placeholder="Search...">
                <div class="sort-btn">
                    <button class="active" onclick="renderRecipes('alphabetical', this)">A-Z</button>
                    <button onclick="renderRecipes('tags', this)">Tags</button>
                    <button onclick="renderRecipes('rating', this)">Rating</button>
                </div>
            </div>
            <div class="header-overlay"></div>
        </div>

        <!--Content-->
        <div class="recipe-index">
            <div id="recipe-list" class="recipe-grid">
            </div>
        </div>

        <!--Footer-->
        <div class="footer">
            <div class="footer-overlay"></div>
            <div class="footer-bottom">
                <h2>©2026 TABLE OF CONTENTS • ALL RIGHTS RESERVED</h2>
                <h2>POWERED BY <a href="https://robertbookdesign.com" target="_blank" rel="noopener noreferrer">ROBERT BOOK DESIGN</a></h2>
            </div>
        </div>

        <!--Java Scripts--> 
        <script src="mechanics.js"></script>
    </body>
</html>
