<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!--Meta Data-->
        <title>Recipe Name</title>
        <meta name="description" content="Table of Contents is the Book family's digital recipe collection — where every recipe describes a mouthwatering story. Explore generations of family favorites, discover new dishes, and connect through the joy of home cooking.">
        <link rel="icon" href="images/favicon.ico" type="image/x-icon">
        <link href="css/style.css" rel="stylesheet">
    </head>
    <body>
        <!--Header-->
        <div class="header">
            <div class="header-top">
                <a href="index.html" id="header-logo">Table of Contents</a>
                <div class="header-links">
                    <a href="index.html">Recipes</a>
                </div>
            </div>
            <div class="tags">
                <ul id="tags-list">
                    <li><a href="recipes.html">Tag</a></li>
                </ul>
            </div>
            <div class="header-overlay"></div>
        </div>

        <!--Content-->
        <div class="content" id="recipe-page-bg" style="background-image: url('images/TemplateBackgroundImage.webp');">
            <div class="recipe-card">
                <div class="left-side-card">
                    <div class="recipe-title">
                        <h1 id="recipe-title">Title</h1>
                    </div>

                    <div class="recipe-review">
                        <div class="star-rating-box">
                            <div class="stars-empty">☆☆☆☆☆</div>
                            <div class="stars-filled" id="star-fill-level" style="width: 0%;">★★★★★</div>
                        </div>
                    </div>

                    <div class="recipe-details-top">
                        <div class="recipe-details">
                            <img id="recipe-servings" src="images/Serves-Icon.webp" alt="Servings Icon">
                            <h4 id="stat-servings">X/Ser</h4>

                            <img id="recipe-time" src="images/Clock-Icon.webp" alt="Clock Icon">
                            <h4 id="stat-time">X/HR</h4>
                        </div>
                        <div class="recipe-details-bot">
                            <img id="recipe-calories" src="images/Calories-Icon.webp" alt="Calories Icon">
                            <h4 id="stat-calories">XXX Cal/Ser</h4>

                            <img id="recipe-difficulty" src="images/Easy-Icon.webp" alt="Difficulty Icon">
                            <h4 id="stat-difficulty">Difficulty</h4></div>
                        </div>

                    <div class="recipe-ingredients">
                        <h1>Ingredients</h1>
                        <div id="ingredients-list">
                        </div>
                    </div>
                </div>
                <div class="right-side-card">
                    <div class="recipe-instructions">
                        <h1>Instructions</h1>
                        <div id="instructions-list">
                        </div> 
                    </div>
                </div>
            </div>
        </div>

        <!--Footer-->
        <div class="footer">
            <div class="footer-overlay"></div>
            <div class="footer-bottom">
                <h2>©2026 TABLE OF CONTENTS • ALL RIGHTS RESERVED</h2>
                <h2>POWERED BY <a href="https://robertbookdesign.com" target="_blank" rel="noopener noreferrer">ROBERT BOOK DESIGN</a></h2>
            </div>
        </div>

        <!--Java Scripts--> 
        <script src="mechanics.js"></script>
    </body>
</html>
